name: Build signed Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "app/**"
      - "build.gradle.kts"
      - "settings.gradle.kts"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate permanent update-signing secrets
        shell: bash
        run: |
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::$name repository secret is required. See SIGNING_SETUP.md."
              exit 1
            fi
          done

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore permanent signing key
        shell: bash
        run: |
          ANDROID_KEYSTORE_PATH="$RUNNER_TEMP/tvroom-release.jks"
          echo "ANDROID_KEYSTORE_PATH=$ANDROID_KEYSTORE_PATH" >> "$GITHUB_ENV"
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"
          keytool -list -keystore "$ANDROID_KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" -alias "$ANDROID_KEY_ALIAS" >/dev/null

      - name: Install Android platform
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.13"
          cache-provider: basic

      - name: Build signed release APK
        run: gradle :app:assembleRelease --stacktrace

      - name: Verify APK signature
        run: |
          "$ANDROID_HOME/build-tools/35.0.0/apksigner" verify --verbose --print-certs \
            app/build/outputs/apk/release/app-release.apk

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/tvroom-downloader.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: tvroom-downloader-apk
          path: app/build/outputs/apk/release/tvroom-downloader.apk
          if-no-files-found: error
